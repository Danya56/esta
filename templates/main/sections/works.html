{% load static %}

<section class="flex flex-col justify-center align-center gap-y-8 py-20">
    <h2 class="font-bold text-center font-montserrat text-2xl tracking-tight">Наши работы</h2>

    <div class="relative h-[300px] md:h-[600px]" x-data="{ activeSlide: 0, slidesCount: {{ slides|length}}, fullscreenImage: null }">

        <div class="w-full h-full relative z-0">
            {% for slide in slides %}

            <div x-show="activeSlide === {{ forloop.counter0 }}" x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0" x-transition:enter-end="opactiy-100" x-cloak
                class="abolute inset-0 w-full h-full">
                <img src="{{slide.image.url}}" alt="{{slide.title}}" class="w-full h-full object-cover z-1 rounded-xl"
                    @click="fullscreenImage = '{{ slide.image.url }}'" />
                <div
                    class="absolute bottom-0 left-0 rounded-b-xl bg-black/75 p-4 w-full border-t border-t-esta-accent  text-white"
                    @click="fullscreenImage = '{{ slide.image.url }}'">
                    <h3 class="text-bold text-xl">{{slide.title}}</h3>
                    <p class="text-xs lg:text-base line-clamp-2 overflow-hidden">{{slide.description}}</p>
                </div>
            </div>
            {% endfor %}
        </div>

        <div x-show="slidesCount > 1"
            class="absolute inset-x-0 top-1/2 -translate-y-1/2 px-4 flex justify-between z-20">
            <button @click="activeSlide = (activeSlide === 0) ? slidesCount - 1 : activeSlide - 1"
                class="bg-esta-accent text-white w-10 h-10 rounded-full hover:bg-white hover:text-esta-accent text-bold shadow-md">
                ❮
            </button>
            <button @click="activeSlide = (activeSlide === slidesCount - 1) ? 0 : activeSlide + 1"
                class="bg-esta-accent text-white w-10 h-10 rounded-full hover:bg-white hover:text-esta-accent text-bold shadow-md">
                ❯
            </button>
        </div>
        <dialog x-ref="modal" x-effect="fullscreenImage ? $refs.modal.showModal() : $refs.modal.close()"
            @close="fullscreenImage = null" @click.self="fullscreenImage = null"
            @keydown.escape.window="fullscreenImage = null"
            class="backdrop:bg-black/85 bg-transparent p-0 max-w-[90vw] max-h-[90vh] overflow-hidden rounded-xl outline-none">
            <div class="relative w-full h-full flex items-center justify-center">
                <button @click="fullscreenImage = null"
                    class="absolute top-4 right-4 bg-black/60 hover:bg-black text-white text-xl font-bold w-10 h-10 flex items-center justify-center rounded-full z-50 transition-colors">
                    ✕
                </button>
                <img :src="fullscreenImage" class="max-w-[90vw] max-h-[90vh] object-contain rounded-xl select-none"
                    alt="Полное изображение">
            </div>

    </div>

</section>

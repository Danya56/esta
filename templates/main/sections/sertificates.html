<section class="py-20">
    <h2 class="font-montserrat font-bold text-2xl text-center">Сертификаты</h2>
    <div class="flex justify-evenly items-center flex-wrap gap-y-4 pt-8">
        {% for certificate in certificates %}
            <img src="{{certificate.image.url}}" alt="{{sertificate.title}}" class="rounded-xl" />
        {% endfor %}
    </div>
</section>
